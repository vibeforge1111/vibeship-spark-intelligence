name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (Ruff)
        run: |
          # Keep this check high-signal and debt-tolerant until full lint cleanup lands.
          python -m ruff check . --select E9,F63,F7,F82 --output-format=github

      - name: Unit Smoke Tests (Pytest)
        run: |
          python -m pytest -q tests/test_safety_guardrails.py tests/test_sparkd_hardening.py tests/test_production_hardening.py

      - name: Alpha Guardrail Checks
        if: matrix.python-version == '3.11'
        run: |
          python scripts/alpha_guardrail_ci.py --max-advisory-files 4 --max-tuneable-keys 320 --max-distillation-files 3 --max-lib-jsonl-runtime-ext-refs 140 --max-runtime-cycles 0

      - name: Alpha Gate Burn-In (CI)
        if: matrix.python-version == '3.11'
        run: |
          python scripts/alpha_gate_burn_in.py --run-label ci --strict-margin 1 --distillation-margin 1

      - name: Alpha Production Gates
        if: matrix.python-version == '3.11'
        run: |
          python scripts/production_loop_report.py

      - name: Alpha Preflight Bundle (CI Mode)
        if: matrix.python-version == '3.11'
        run: |
          python scripts/alpha_preflight_bundle.py --ci-mode --json-only

  alpha-smoke:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Alpha Gate Burn-In (Smoke Prep)
        run: |
          python scripts/alpha_gate_burn_in.py --run-label ci_smoke --strict-margin 1 --distillation-margin 1

      - name: Alpha Smoke Gates
        run: |
          python scripts/production_loop_report.py
          python scripts/strict_attribution_smoke.py
          python scripts/spark_alpha_replay_arena.py --seed 42 --episodes 8 --min-consecutive-wins 3

  integration-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Integration Tests
        run: |
          python -m pytest -q -m integration
