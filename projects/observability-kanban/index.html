<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability Kanban Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar shell">
    <div class="brand-block">
      <p class="brand-kicker mono">vibeship.co / observability</p>
      <h1>Execution Kanban</h1>
      <p id="updatedAt" class="muted"></p>
    </div>
    <div class="toolbar" role="group" aria-label="Board actions">
      <button id="resetBoardBtn" class="btn btn-secondary">Reset Board</button>
      <button id="exportBoardBtn" class="btn">Export JSON</button>
    </div>
  </header>

  <main class="shell dashboard-shell">
    <section class="kpi-grid" id="kpiGrid" aria-label="KPI summary"></section>
    <section class="trends-grid" id="kpiTrends" aria-label="KPI trends"></section>
    <section class="analytics-grid" id="analyticsGrid" aria-label="Board analytics"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Top Next Tasks</h2>
        <span class="muted mono">score-ranked execution picks</span>
      </div>
      <div id="topTasks" class="task-list"></div>
    </section>

    <section class="board" id="board" aria-label="Kanban board"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Question-Derived Backlog</h2>
        <span class="muted">Actionables from Memory, Advisory, Web, Observatory, and Pulse interrogation</span>
      </div>
      <div id="questionBacklog" class="task-list"></div>
    </section>
  </main>

  <div id="reviewModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="reviewModalTitle">
      <h3 id="reviewModalTitle">Needs Review Checklist</h3>
      <p class="muted" id="reviewTaskLabel"></p>
      <label for="reviewRootCause">Root cause</label>
      <textarea id="reviewRootCause" rows="3" placeholder="What actually caused the miss/failure?"></textarea>
      <label for="reviewAdjustment">Adjustment</label>
      <textarea id="reviewAdjustment" rows="3" placeholder="What did we change to fix it?"></textarea>
      <label for="reviewRetest">Retest plan</label>
      <textarea id="reviewRetest" rows="3" placeholder="How will we validate it next run?"></textarea>
      <div class="modal-actions">
        <button id="reviewCancelBtn" class="btn btn-secondary">Cancel</button>
        <button id="reviewSaveBtn" class="btn">Save and Move to READY</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
