<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability Kanban Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Observability Kanban Dashboard</h1>
      <p id="updatedAt" class="muted"></p>
    </div>
    <div class="toolbar">
      <button id="resetBoardBtn" class="btn btn-secondary">Reset Board</button>
      <button id="exportBoardBtn" class="btn">Export JSON</button>
    </div>
  </header>

  <section class="kpi-grid" id="kpiGrid"></section>
  <section class="trends-grid" id="kpiTrends"></section>
  <section class="analytics-grid" id="analyticsGrid"></section>

  <section class="panel">
    <div class="panel-head">
      <h2>Top Next Tasks (Score-ranked)</h2>
    </div>
    <div id="topTasks" class="task-list"></div>
  </section>

  <section class="board" id="board"></section>

  <section class="panel">
    <div class="panel-head">
      <h2>Question-Derived Backlog</h2>
      <span class="muted">Actionables from Memory / Advisory / Web / Observatory / Pulse interrogation</span>
    </div>
    <div id="questionBacklog" class="task-list"></div>
  </section>

  <div id="reviewModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3>Needs Review Checklist</h3>
      <p class="muted" id="reviewTaskLabel"></p>
      <label>Root cause</label>
      <textarea id="reviewRootCause" rows="3" placeholder="What actually caused the miss/failure?"></textarea>
      <label>Adjustment</label>
      <textarea id="reviewAdjustment" rows="3" placeholder="What did we change to fix it?"></textarea>
      <label>Retest plan</label>
      <textarea id="reviewRetest" rows="3" placeholder="How will we validate it next run?"></textarea>
      <div class="modal-actions">
        <button id="reviewCancelBtn" class="btn btn-secondary">Cancel</button>
        <button id="reviewSaveBtn" class="btn">Save & Move to READY</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
